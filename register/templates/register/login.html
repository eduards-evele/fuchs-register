{% extends 'register/base.html' %}
{% load i18n %}
{% block content %}
<div class="login-container">
    <form method="post" class="surface-deep login-form">
        {% csrf_token %}
        <h1>{% trans "Login" %}</h1>

        {% if form.errors %}
        <div class="login-error">
            {% trans "Invalid username or password." %}
        </div>
        {% endif %}

        <div class="form-group">
            <label class="sr-only" for="username">{% trans "Username" %}</label>
            <input
                type="text"
                name="username"
                id="username"
                class="form-control"
                placeholder="{% trans "Username" %}"
                required
                autofocus
            >
        </div>

        <div class="form-group">
            <label class="sr-only" for="password">{% trans "Password" %}</label>
            <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="{% trans "Password" %}"
                required
            >
        </div>

        <button type="submit" class="btn-primary lg login-btn">{% trans "Sign In" %}</button>
    </form>
</div>
{% endblock %}
